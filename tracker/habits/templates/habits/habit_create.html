{% extends "base.html" %}

{% block title %}Create Habit{% endblock %}

{% block content %}

<div class="card">
    <div class="card-body">
        <h1 class="mb-4">Create habit</h1>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Save
            </button>

            <a href="{% url 'habit_list' %}" class="btn btn-secondary">
                Go back
            </a>
        </form>
    </div>
</div>

{% endblock %}

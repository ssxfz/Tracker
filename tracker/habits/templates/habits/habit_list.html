<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My habits</title>
</head>
<body>
    <h1>My habits</h1>

    <a href="{% url 'habit_create' %}">Create habit</a>

    <hr>

    {% for habit in habits %}
        <div>
            <h3>{{ habit.title }}</h3>
            <p>{{ habit.description }}</p>
            <p>Streak: {{ habit.streak }}</p>
            <p>Last done: {{ habit.last_done_date }}</p>

            <a href="{% url 'habit_done' habit.id %}">Done today</a>

            <form method="post" action="{% url 'habit_delete' habit.id %}">
                {% csrf_token %}
                <button type="submit">Delete</button>
            </form>
        </div>

        <hr>
    {% empty %}
        <p>No habits yet</p>
    {% endfor %}
</body>
</html>

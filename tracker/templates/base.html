{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Habit Tracker{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="theme-dark">

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
        <a class="navbar-brand" href="/habits/">Tracker</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/habits/">My Habits</a>
            <a class="nav-link" href="/habits/create/">Create Habit</a>
            <a class="nav-link" href="{% url 'schedule' %}">My Schedule</a>
        </div>

        <div class="ms-auto">
            <span class="navbar-text me-3">
                {{ user.username }}
            </span>

                <form class="theme-switch-form">
                    <input id="dark-mode" class="theme-toggle" type="checkbox" name="Dark mode" role="switch">
                    <label for="dark-mode" class="sr">Dark Mode</label>
                </form>

            <form method="post" action="/logout/" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
{% endif %}

<main class="container mt-4">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/main.js' %}"></script>
</body>
</html>

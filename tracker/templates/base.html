<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Habit Tracker{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/habits/">Tracker</a>

        <div class="navbar-nav">
            <a class="nav-link" href="/habits/">My Habits</a>
            <a class="nav-link" href="/habits/create/">Create Habit</a>
            <a class="nav-link" href="{% url 'schedule' %}">My Schedule</a>
        </div>

        <div class="ms-auto">
            <span class="navbar-text me-3">
                {{ user.username }}
            </span>

            <form method="post" action="/logout/" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
{% endif %}

<main class="container mt-4">
    {% block content %}
    {% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
